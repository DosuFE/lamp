<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#001f3f"/>
  
  <!-- Graduation Cap -->
  <g transform="translate(32, 20)">
    <!-- Cap top -->
    <path d="M -14 -2 L -18 4 L 18 4 L 14 -2 Z" fill="#fff" stroke="#fff" stroke-width="1"/>
    <!-- Cap visor -->
    <ellipse cx="0" cy="4" rx="18" ry="3" fill="#fff"/>
    <!-- Tassel -->
    <line x1="14" y1="-2" x2="16" y2="12" stroke="#fbbf24" stroke-width="2"/>
    <circle cx="16" cy="13" r="2" fill="#fbbf24"/>
  </g>
  
  <!-- Light Bulb -->
  <g transform="translate(32, 36)">
    <!-- Glow aura -->
    <circle cx="0" cy="-2" r="12" fill="#fbbf24" opacity="0.2"/>
    <circle cx="0" cy="-2" r="10" fill="#fbbf24" opacity="0.3"/>
    <!-- Bulb glass with glow -->
    <circle cx="0" cy="-2" r="8" fill="#fef08a" opacity="1" filter="url(#glow)"/>
    <circle cx="0" cy="-2" r="8" fill="#fbbf24" opacity="0.8"/>
    <!-- Bulb highlight -->
    <circle cx="-3" cy="-5" r="3" fill="#fef3c7" opacity="0.9"/>
    <circle cx="-3" cy="-5" r="3" fill="#fff" opacity="0.5"/>
    <!-- Filament -->
    <path d="M -2 2 Q 0 4 2 2" stroke="#fef3c7" stroke-width="1.5" fill="none" filter="url(#glow)"/>
    <!-- Base -->
    <rect x="-4" y="6" width="8" height="2" fill="#fff" rx="1"/>
    <!-- Threads -->
    <rect x="-3" y="8" width="6" height="1" fill="#e5e7eb"/>
    <rect x="-3" y="10" width="6" height="1" fill="#e5e7eb"/>
  </g>
</svg>
